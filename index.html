<!DOCTYPE html>
<html lang="fr">
    <head>
        <title>CalculatriceJS</title>
        <meta charset="UTF-8">
        <meta name="author" content="Marin Tricoteaux">
        <meta name="description" content="A calculatrice made in vanilla JS in 2 hours.">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="scripts/script.js" defer></script>
        <script src="scripts/main.js" defer></script>
    </head>
    <body>
        <main>
            <section id="mainZone">
                <input type="text" id="screen">
                <div id="btnZone">
                    <button id="btn7" class="btn number">7</button>
                    <button id="btn8" class="btn number">8</button>
                    <button id="btn9" class="btn number">9</button>
                    <button id="btnAddition" class="btn operator">+</button>
                    <button id="btn4" class="btn number">4</button>
                    <button id="btn5" class="btn number">5</button>
                    <button id="btn6" class="btn number">6</button>
                    <button id="btnSoustraction" class="btn operator">-</button>
                    <button id="btn1" class="btn number">1</button>
                    <button id="btn2" class="btn number">2</button>
                    <button id="btn3" class="btn number">3</button>
                    <button id="btnMultiplication" class="btn operator">*</button>
                    <button id="btn0" class="btn number">0</button>
                    <button id="btnDot" class="btn dot">.</button>
                    <button id="btnResult" class="btn result">=</button>
                    <button id="btnDivision" class="btn operator">/</button>
                    <button id="btnReset" class="btn reset">Reset</button>
                </div>
            </section>
        </main>
    </body>
</html>
